<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nusrat Enterprises — Invoice (Vertical + WA Staged Flow + Fixed Sale Type)</title>

  <link rel="stylesheet" href="style.css">

  <!-- PDF deps -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- ================================
       HEADER
       ================================ -->
  <header>
    <div class="hdr-row">
      <div>
        <h1>Nusrat Enterprises — Invoice</h1>
        <div class="header-meta">📞 7978830017 • 9330066455 • 9040366455</div>
        <div class="header-addr">📍Plot No. 53, Goutam Nagar, Bhubaneswar, Odisha — 751014</div>
      </div>
      <!-- Dark mode toggle -->
      <button id="themeToggle" type="button" class="btn ghost" style="min-width:120px">🌙 Dark Mode</button>
    </div>
  </header>

  <!-- ================================
       MAIN CONTENT
       ================================ -->
  <div class="container">
    <div class="row" style="grid-template-columns:1fr; gap:12px">
      <!-- Invoice & Customer -->
      <div class="card">
        <h2>Invoice & Customer</h2>
        <div class="row cols-2">
          <div>
            <label>Invoice #</label>
            <input id="invoiceNumber" readonly />
          </div>
          <div>
            <label>Date</label>
            <input id="invoiceDate" type="date" disabled />
          </div>
        </div>

        <div class="row cols-2" style="margin-top:8px">
          <div>
            <label>Customer Name</label>
            <input id="customerName" placeholder="Enter customer name"/>
            <div class="error"></div>
          </div>
          <div>
            <label>Customer WhatsApp (10 digits)</label>
            <div class="phone-field">
              <div class="phone-adorn">
                <input
                  id="customerPhone"
                  class="phone-input"
                  type="tel"
                  inputmode="tel"
                  autocomplete="tel"
                  pattern="[0-9]*"
                  maxlength="10"
                  placeholder="e.g., 9876543210"
                />
                <button type="button" class="icon-btn inline" id="pickContactBtn" aria-label="Pick from contacts">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M18 7h2M18 12h2M18 17h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="11" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M14.8 16a3.8 3.8 0 0 0-7.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
              <div id="phoneError" class="error">Enter exactly 10 digits.</div>
            </div>
          </div>
        </div>

        <!-- Sale Type -->
        <div class="row cols-2" style="margin-top:10px">
          <div>            
            <label style="margin-bottom:15px">Sale Type</label>
            <div class="seg-raised" role="radiogroup" aria-label="Sale Type" id="saleTypeGroup">
              <label class="seg">
                <input type="radio" name="saleTypeRadio" value="Retail" />
                <span>Retail</span>
              </label>
              <label class="seg">
                <input type="radio" name="saleTypeRadio" value="Wholesale" />
                <span>Wholesale</span>
              </label>
            </div>
          </div>
          <input type="hidden" id="saleType" value="">
        </div>
        <div class="coupon-toggle">
          <span class="label-text">Give Coupon?</span>
          <label class="switch">
          <input type="checkbox" id="couponToggle">
          <span class="slider round"></span>
          </label>
  
</div>
      </div>

      <!-- Items -->
      <div class="card" style="margin-top:8px">
        <div class="items-head">
          <h2>Items</h2>
          <button type="button" class="btn link" id="clearItemsBtn" style="margin-bottom: 8px;">🧹 Clear Items</button>
        </div>

        <!-- Quickline -->
        <form id="quicklineForm" class="quickline" style="margin-bottom:8px; display:flex; gap:8px; align-items:center">
          <input
            id="quickline"
            placeholder="Quick add: Item  Qty  Rate  →  e.g., Shirt 2 300"
            autocomplete="off"
            enterkeyhint="done"
            aria-label="Quick add item line"
            style="flex:1"
          />
          <button type="submit" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden">Submit</button>
        </form>

        <!-- Items list -->
        <ul id="itemsList" class="items-list" aria-label="Invoice items"></ul>
      </div>

      <!-- Summary -->
      <div class="card">
        <h2>Summary</h2>
        <div class="row">
          <div><label>Subtotal (₹)</label><input id="subtotal" disabled/></div>

          <div class="row cols-2">
            <div>
              <label>Items (breakdown)</label>
              <textarea id="itemsBreakdown" disabled placeholder="e.g., 2x Shirt, 1x Jean"></textarea>
            </div>
            <div>
              <label>Total Qty</label>
              <input id="itemsCountQty" disabled/>
            </div>
          </div>

          <div class="row cols-2">
            <div><label>GST %</label><input id="taxRate" type="number" min="0" step="0.01" value="0" inputmode="decimal"/></div>
            <div><label>Discount (₹)</label><input id="flatDiscount" type="number" min="0" step="0.01" value="0" inputmode="decimal"/></div>
          </div>

          <div><label>Grand Total (₹)</label><input id="grandTotal" disabled/></div>

          <div class="row cols-2" style="margin-top:8px">
            <div>
              <label>Payment Mode</label>
              <select id="paymentMode">
                <option value="">Select</option>
                <option value="Cash">Cash</option>
                <option value="UPI">UPI</option>
                <option value="Card">Card</option>
                <option value="Bank Transfer">Bank Transfer</option>
              </select>
              <div class="error"></div>
            </div>
            <div>
              <label>Paid (₹)</label>
              <input id="paidAmount" type="text" inputmode="decimal" placeholder="0.00" />
              <div id="paidError" class="error"></div>
            </div>
          </div>

          <div>
            <label>Negotiated (₹)</label>
            <input id="dueAmount" disabled/>
          </div>
        </div>
      </div>
<!-- Actions -->
      <div class="card actions-card">
        <h2>Actions</h2>
        <div class="action-buttons">

          <!-- Complete Invoice Process — Staged flow (icon removed as requested) -->
          <button id="whatsAppBtn" class="wa-btn btn-yellow" type="button" aria-live="polite">
            <!-- Center: dynamic label -->
            <span class="wa-label">
              <span class="text-default">💼 Complete Invoice Process</span>
              <span class="text-saving" aria-hidden="true">Saving…</span>
              <span class="text-downloading" aria-hidden="true">Downloading…</span>
              <span class="text-sending" aria-hidden="true">Sending…</span>
              <span class="text-success" aria-hidden="true">Sent!</span>
            </span>

            <!-- Right: stage icon stack -->
            <span class="stage-icon" aria-hidden="true">
              <!-- Saving -->
              <svg class="icon-save" viewBox="0 0 24 24">
                <path fill="currentColor" d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4ZM7 5h8v4H7V5Zm5 14a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z"/>
              </svg>
              <!-- Downloading -->
              <svg class="icon-download" viewBox="0 0 24 24">
                <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 0 1 1.4-1.42L11 12.6V4a1 1 0 0 1 1-1Zm-7 14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1a1 1 0 1 1 2 0v1Z"/>
              </svg>
              <!-- Sending -->
              <svg class="icon-send" viewBox="0 0 24 24">
                <path fill="currentColor" d="M2.01 3.87a1 1 0 0 1 1.2-.16l18 10a1 1 0 0 1 0 1.78l-18 10a1 1 0 0 1-1.43-1.13l2.22-7.76 8.1-2-8.1-2-2.22-7.76a1 1 0 0 1 .23-.97Z"/>
              </svg>
            </span>

            <!-- Furthest right: spinner -->
            <span class="spinner" aria-hidden="true"></span>

            <!-- Success check -->
            <span class="success-check" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="100%" height="100%">
                <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-opacity=".85" stroke-width="2"/>
                <path d="M7 12.5l3.2 3.2L17 9.8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>

          <!-- NEW: WhatsApp Invoice ONLY (ghost) -->
          <button type="button" class="btn ghost" id="waInvoiceBtn">📲 WhatsApp Invoice</button>

          <!-- Print / PDF -->
          <button type="button" class="btn ghost" id="printBtn">🖨️ Print / PDF</button>
          <button type="button" class="btn ghost" id="previewBtn">👁️ Preview</button>
          <button type="button" class="btn ghost" id="copyTextBtn">📋 Copy Summary</button>

          <!-- Optional: Manual VCF download -->
          <button type="button" class="btn ghost" id="vcfBtn">👤 Download .vcf</button>

          <!-- Save to Google Sheet -->
          <button type="button" class="btn ghost" id="saveToSheetBtn">
            <span class="btn-icon" aria-hidden="true">📑</span>
            <span class="btn-text">Save to Google Sheet</span>
            <span class="spinner" aria-hidden="true" style="display:none"></span>
          </button>

        </div>
      </div>

      <!-- Preview -->
      <div class="card" id="previewCard" style="display:none">
        <h2>Invoice Preview</h2>
        <div id="invoicePreview" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <!-- Offscreen PDF render target -->
  <div id="monoRender" style="position:fixed; left:-10000px; top:0; opacity:0; pointer-events:none; visibility:visible; z-index:-1;"></div>

  <!-- Floating Add button -->
  <button type="button" class="fab" id="fabAdd">+ Add</button>
  <!-- ================================
       APPLICATION SCRIPT
       ================================ -->
       <script src="script.js"></script>

  </body>
</html>
