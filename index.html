<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nusrat Enterprises — Invoice (Vertical + WA Staged Flow + Fixed Sale Type)</title>

  <!-- ================================
       THEME & BASE STYLES
       ================================ -->
  <style>
    :root{
      --brand:#b91c1c;--brand-2:#7f1d1d;
      --bg:#fafafa;--text:#111827;--muted:#6b7280;
      --card:#fff;--border:#e5e7eb;--soft:#fff1f2;
      --font:14px; --pad:10px; --gap:8px; --radius:12px;
      --btn-ghost-bg:#f3f4f6; --btn-ghost-ink:#111827;
      --link:#1d4ed8;
    }
    /* Dark mode */
    :root[data-theme="dark"]{
      --bg:#0b0f17; --text:#f9fafb; --muted:#9ca3af;
      --card:#111827; --border:#1f2937; --soft:#2a1a1c;
      --btn-ghost-bg:#1f2937; --btn-ghost-ink:#e5e7eb;
      --link:#93c5fd;
    }

    *{box-sizing:border-box; min-width:0}
    html,body{
      min-height:100%;
      margin:0;
      overflow-x:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      font-size:var(--font)
    }
    a{ color:var(--link) }

    /* Header */
    header{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 6px 20px rgba(0,0,0,.06);
      padding:12px 14px 14px 14px;
      margin:10px auto;
      max-width:720px;
    }
    .hdr-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
    h1{margin:0;font-weight:800;font-size:1.2rem;color:var(--brand-2)}
    .header-meta{margin-top:6px;font-size:.92rem;color:var(--muted)}
    .header-addr{margin-top:4px;font-size:.9rem;color:var(--muted)}

    /* Layout cards */
    .container{max-width:720px;margin:10px auto 80px;padding:0 10px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 6px 20px rgba(0,0,0,.06);
      padding:12px
    }
    h2{margin:4px 0 8px;color:var(--brand-2);font-size:1.22rem}

    /* Form controls */
    label{display:block;font-weight:700;font-size:.95rem;margin-bottom:6px}
    input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:#fff;color:#111827}
    :root[data-theme="dark"] input,
    :root[data-theme="dark"] select,
    :root[data-theme="dark"] textarea{ background:#0f172a;color:#e5e7eb;border-color:#334155 }
    input::placeholder, textarea::placeholder{ color:#9ca3af }
    input[disabled],textarea[disabled]{background:#f9fafb;color:#6b7280}
    :root[data-theme="dark"] input[disabled],
    :root[data-theme="dark"] textarea[disabled]{background:#0b1220;color:#6b7280}
    textarea{resize:vertical;min-height:48px}
    .row{display:grid;gap:var(--gap)}
    .cols-2{grid-template-columns:1fr 1fr}
    @media(max-width:600px){.cols-2{grid-template-columns:1fr}}
    .error{color:#b91c1c;font-size:.82rem;margin-top:4px;display:none}

    /* Buttons */
    .actions-card{padding:16px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
    .action-buttons{display:grid;gap:8px;grid-template-columns:1fr}
    .btn{
      appearance:none;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:11px 14px;border-radius:10px;font-size:15px;font-weight:700;transition:all .2s ease;text-decoration:none;line-height:1.1;min-height:44px;
      box-shadow:0 1px 0 rgba(0,0,0,0.03); color:#fff;
    }
    .btn:focus-visible{outline:3px solid #93c5fd;outline-offset:2px}
    .btn.primary{background:#25D366;box-shadow:0 6px 16px rgba(37,211,102,0.28)}
    .btn.outline{border:2px solid #1d4ed8;background:transparent;color:#1d4ed8}
    :root[data-theme="dark"] .btn.outline{border-color:#93c5fd;color:#93c5fd}
    .btn.ghost{background:var(--btn-ghost-bg);color:var(--btn-ghost-ink)}
    .btn.link{background:#fff;border:1px solid var(--border);color:#111827}
    :root[data-theme="dark"] .btn.link{background:#0f172a;color:#e5e7eb;border-color:#334155}
    .btn.danger{background:#991b1b}

    /* FAB */
    .fab{
      position:fixed; right:14px; bottom:14px; z-index:30;
      background:var(--brand); color:#fff; border:none; border-radius:999px; padding:12px 16px;
      box-shadow:0 8px 20px rgba(0,0,0,.25); font-weight:800; font-size:16px;
    }

    /* Items list */
    .items-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .items-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
    .item{border:1px solid var(--border);border-radius:10px;background:var(--card);padding:8px 8px}
    .item .top{display:flex;align-items:center;gap:8px}
    .item .top .type{flex:0 0 34%}
    .item .top .name{flex:1}
    .item .top .del{flex:0 0 auto}
    .item .bot{display:flex;align-items:center;gap:8px;margin-top:6px}
    .stepper{display:inline-flex;align-items:center;gap:6px}
    .stepper .sbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:#fff;font-weight:900}
    :root[data-theme="dark"] .stepper .sbtn{background:#0f172a;border-color:#334155;color:#e5e7eb}
    .qty{width:60px;text-align:center}
    .rate{flex:1.2}
    .amt{margin-left:auto;font-weight:800}

    /* Name field adorn (counter) */
    .name-wrap{ position:relative; }
    .name-wrap > input{ padding-right:64px; }
    .char-counter{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      font-size:12px; color:var(--muted); pointer-events:none; user-select:none;
    }

    /* Print/Preview */
    .print-header{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .print-title{font-size:1.15rem;font-weight:800;color:var(--brand-2)}
    .print-meta{font-size:.92rem;color:var(--muted)}
    @media print{header{display:none!important}.card{border:none;box-shadow:none}}

    /* WhatsApp staged button (functional base) */
    :root{
      --wa-green: #4ebe77;
      --wa-green-dark: #1fb656;
      --btn-text: #013b1a;
      --wa-focus: 0 0 0 3px rgba(37, 211, 102, 0.35);
      --stage-icon-size: 16px;
      --wa-icon-size: 18px;
      --wa-gap: 10px;
      --easing: cubic-bezier(.2,.7,.2,1);
    }
    .wa-btn{
      display: inline-grid; grid-auto-flow: column; align-items: center; gap: var(--wa-gap);
      min-height: 44px; padding: 12px 16px;
      background: var(--wa-green); color: var(--btn-text);
      border: none; border-radius: 12px; cursor: pointer; font-weight: 600; letter-spacing: .2px;
      user-select: none; transition: background .18s ease, transform .04s ease; position: relative;
      box-shadow: 0 1px 0 #00000008, 0 1px 10px #0d3b2414, inset 0 -1px 0 #0000000f;
    }
    .wa-btn:hover{ background: var(--wa-green-dark); }
    .wa-btn:active{ transform: translateY(1px); }
    .wa-btn:focus-visible{ outline: none; box-shadow: var(--wa-focus); }
    .wa-btn.is-saving,
    .wa-btn.is-downloading,
    .wa-btn.is-sending,
    .wa-btn.is-success{ pointer-events: none; }
    .wa-label{ min-width:8ch; white-space:nowrap; display:inline-grid; grid-auto-flow:column; align-items:center }
    .wa-label .text-default{ display:inline; }
    .wa-label .text-saving,
    .wa-label .text-downloading,
    .wa-label .text-sending,
    .wa-label .text-success{ display:none; }
    .wa-btn.is-saving .text-default{ display:none; }
    .wa-btn.is-saving .text-saving{ display:inline; }
    .wa-btn.is-downloading .text-default{ display:none; }
    .wa-btn.is-downloading .text-downloading{ display:inline; }
    .wa-btn.is-sending .text-default{ display:none; }
    .wa-btn.is-sending .text-sending{ display:inline; }
    .wa-btn.is-success .text-default{ display:none; }
    .wa-btn.is-success .text-success{ display:inline; }

    .stage-icon{ position:relative; width:var(--stage-icon-size); height:var(--stage-icon-size); display:inline-block }
    .stage-icon svg{
      position:absolute; inset:0; width:100%; height:100%;
      opacity:0; transform:translateY(6px) scale(.92);
      transition: opacity .22s var(--easing), transform .26s var(--easing);
      will-change: opacity, transform; color:#fff;
    }
    .wa-btn.is-saving      .stage-icon .icon-save,
    .wa-btn.is-downloading .stage-icon .icon-download,
    .wa-btn.is-sending     .stage-icon .icon-send{
      opacity:1; transform:translateY(0) scale(1);
    }

    .spinner{
      width: var(--stage-icon-size); height: var(--stage-icon-size);
      border-radius: 50%;
      border: 2px solid #ffffffaa; border-top-color:#fff;
      animation:spin .8s linear infinite; display:none;
    }
    .wa-btn.is-saving .spinner,
    .wa-btn.is-downloading .spinner,
    .wa-btn.is-sending .spinner{ display:inline-block; }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    .success-check{ width:var(--stage-icon-size); height:var(--stage-icon-size); display:none; color:#fff }
    .wa-btn.is-success .stage-icon{ display:none; }
    .wa-btn.is-success .spinner{ display:none; }
    .wa-btn.is-success .success-check{ display:inline-block; animation:pop-in .28s var(--easing); }
    @keyframes pop-in{ 0%{ transform:scale(.6); opacity:0 } 60%{ transform:scale(1.08); opacity:1 } 100%{ transform:scale(1) } }

    /* Icon-only contact button */
    .icon-btn{
      appearance:none; border:none; background: transparent; color: var(--link);
      cursor:pointer; border-radius:10px; display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; padding:0; transition: background .15s ease, color .15s ease, transform .05s ease;
    }
    .icon-btn:hover{ background: color-mix(in lab, currentColor 8%, transparent); }
    .icon-btn:active{ transform: translateY(1px); }
    .icon-btn:focus-visible{ outline:3px solid #93c5fd; outline-offset:2px; }
    .icon-btn .icon{ width:20px; height:20px; display:block; }

    /* Phone adorn */
    .phone-field{ display:block; }
    .phone-adorn{ position:relative; }
    .phone-adorn .phone-input{ padding-right:44px; }
    .phone-adorn .icon-btn.inline{
      position:absolute; right:4px; top:50%; transform:translateY(-50%);
      width:36px; height:36px; border-radius:10px;
    }

    /* Sale Type Segmented */
    .seg-raised{
      display: grid; grid-auto-flow: column; gap: 10px;
      background: transparent; border: none;
    }
    .seg-raised .seg{
      position: relative;
      display:grid; grid-auto-flow: column; align-items:center; justify-content:center;
      gap: 8px; padding: 0 16px;
      min-width: 140px; height: 42px;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      border:1px solid var(--border);
      cursor:pointer; user-select:none;
      transition: transform .16s ease, box-shadow .16s ease, color .16s ease, border-color .16s ease, background .16s ease;
    }
    .seg-raised .seg:hover{ transform: translateY(-1px); }
    .seg-raised .seg input[type="radio"]{
      position: absolute; inline-size:1px; block-size:1px; margin:-1px; padding:0;
      overflow:hidden; clip: rect(0 0 0 0); white-space:nowrap; border:0;
    }
    .seg-raised .seg:focus-within{ outline: 3px solid #93c5fd; outline-offset: 3px; }
    .seg-raised .seg.active{
      background: linear-gradient(180deg, var(--brand), color-mix(in lab, var(--brand) 78%, #ffffff 22%));
      color: #fff;
      border-color: color-mix(in lab, var(--brand) 70%, #000 30%);
      box-shadow:
        0 10px 22px rgba(0,0,0,.26),
        0 0 0 2px color-mix(in lab, var(--brand) 30%, transparent) inset,
        0 1px 0 rgba(255,255,255,.18) inset;
      transform: translateY(-1px);
      font-weight: 700;
    }
    :root[data-theme="dark"] .seg-raised .seg{ background: transparent; border-color:#334155; color:#9ca3af; }
    :root[data-theme="dark"] .seg-raised .seg.active{
      background: linear-gradient(180deg, color-mix(in lab, var(--brand) 90%, #000 10%), color-mix(in lab, var(--brand) 65%, #000 35%));
      border-color: color-mix(in lab, var(--brand) 55%, #000 45%); color:#fff;
    }

    /* ================================
       UPDATED Professional Yellow Button — overrides for WA button
       ================================ */
    .wa-btn.btn-yellow{
      background: linear-gradient(180deg, #facc15, #eab308);
      color: #1f2937;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .2px;
      box-shadow:
        0 10px 24px rgba(250, 204, 21, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    .wa-btn.btn-yellow:hover{
      background: linear-gradient(180deg, #fcd34d, #facc15);
      transform: translateY(-2px);
      box-shadow:
        0 14px 28px rgba(250, 204, 21, 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }
    .wa-btn.btn-yellow:active{
      transform: translateY(1px);
      box-shadow:
        0 6px 16px rgba(250, 204, 21, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
  </style>

  <!-- PDF deps -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- ================================
       HEADER
       ================================ -->
  <header>
    <div class="hdr-row">
      <div>
        <h1>Nusrat Enterprises — Invoice</h1>
        <div class="header-meta">📞 7978830017 • 9330066455 • 9040366455</div>
        <div class="header-addr">📍Plot No. 53, Goutam Nagar, Bhubaneswar, Odisha — 751014</div>
      </div>
      <!-- Dark mode toggle -->
      <button id="themeToggle" type="button" class="btn ghost" style="min-width:120px">🌙 Dark Mode</button>
    </div>
  </header>

  <!-- ================================
       MAIN CONTENT
       ================================ -->
  <div class="container">
    <div class="row" style="grid-template-columns:1fr; gap:12px">
      <!-- Invoice & Customer -->
      <div class="card">
        <h2>Invoice & Customer</h2>
        <div class="row cols-2">
          <div>
            <label>Invoice #</label>
            <input id="invoiceNumber" readonly />
          </div>
          <div>
            <label>Date</label>
            <input id="invoiceDate" type="date" disabled />
          </div>
        </div>

        <div class="row cols-2" style="margin-top:8px">
          <div>
            <label>Customer Name</label>
            <input id="customerName" placeholder="Enter customer name"/>
            <div class="error"></div>
          </div>
          <div>
            <label>Customer WhatsApp (10 digits)</label>
            <div class="phone-field">
              <div class="phone-adorn">
                <input
                  id="customerPhone"
                  class="phone-input"
                  type="tel"
                  inputmode="tel"
                  autocomplete="tel"
                  pattern="[0-9]*"
                  maxlength="10"
                  placeholder="e.g., 9876543210"
                />
                <button type="button" class="icon-btn inline" id="pickContactBtn" aria-label="Pick from contacts">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M18 7h2M18 12h2M18 17h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="11" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M14.8 16a3.8 3.8 0 0 0-7.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
              <div id="phoneError" class="error">Enter exactly 10 digits.</div>
            </div>
          </div>
        </div>

        <!-- Sale Type -->
        <div class="row cols-2" style="margin-top:10px">
          <div>
            <label style="margin-bottom:15px">Sale Type</label>
            <div class="seg-raised" role="radiogroup" aria-label="Sale Type" id="saleTypeGroup">
              <label class="seg">
                <input type="radio" name="saleTypeRadio" value="Retail" />
                <span>Retail</span>
              </label>
              <label class="seg">
                <input type="radio" name="saleTypeRadio" value="Wholesale" />
                <span>Wholesale</span>
              </label>
            </div>
          </div>
          <input type="hidden" id="saleType" value="">
        </div>
      </div>

      <!-- Items -->
      <div class="card" style="margin-top:8px">
        <div class="items-head">
          <h2>Items</h2>
          <button type="button" class="btn link" id="clearItemsBtn" style="margin-bottom: 8px;">🧹 Clear Items</button>
        </div>

        <!-- Quickline -->
        <form id="quicklineForm" class="quickline" style="margin-bottom:8px; display:flex; gap:8px; align-items:center">
          <input
            id="quickline"
            placeholder="Quick add: Item  Qty  Rate  →  e.g., Shirt 2 300"
            autocomplete="off"
            enterkeyhint="done"
            aria-label="Quick add item line"
            style="flex:1"
          />
          <button type="submit" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden">Submit</button>
        </form>

        <!-- Items list -->
        <ul id="itemsList" class="items-list" aria-label="Invoice items"></ul>
      </div>

      <!-- Summary -->
      <div class="card">
        <h2>Summary</h2>
        <div class="row">
          <div><label>Subtotal (₹)</label><input id="subtotal" disabled/></div>

          <div class="row cols-2">
            <div>
              <label>Items (breakdown)</label>
              <textarea id="itemsBreakdown" disabled placeholder="e.g., 2x Shirt, 1x Jean"></textarea>
            </div>
            <div>
              <label>Total Qty</label>
              <input id="itemsCountQty" disabled/>
            </div>
          </div>

          <div class="row cols-2">
            <div><label>GST %</label><input id="taxRate" type="number" min="0" step="0.01" value="0" inputmode="decimal"/></div>
            <div><label>Discount (₹)</label><input id="flatDiscount" type="number" min="0" step="0.01" value="0" inputmode="decimal"/></div>
          </div>

          <div><label>Grand Total (₹)</label><input id="grandTotal" disabled/></div>

          <div class="row cols-2" style="margin-top:8px">
            <div>
              <label>Payment Mode</label>
              <select id="paymentMode">
                <option value="">Select</option>
                <option value="Cash">Cash</option>
                <option value="UPI">UPI</option>
                <option value="Card">Card</option>
                <option value="Bank Transfer">Bank Transfer</option>
              </select>
              <div class="error"></div>
            </div>
            <div>
              <label>Paid (₹)</label>
              <input id="paidAmount" type="text" inputmode="decimal" placeholder="0.00" />
              <div id="paidError" class="error"></div>
            </div>
          </div>

          <div>
            <label>Negotiated (₹)</label>
            <input id="dueAmount" disabled/>
          </div>
        </div>
      </div>
<!-- Actions -->
      <div class="card actions-card">
        <h2>Actions</h2>
        <div class="action-buttons">

          <!-- Complete Invoice Process — Staged flow (icon removed as requested) -->
          <button id="whatsAppBtn" class="wa-btn btn-yellow" type="button" aria-live="polite">
            <!-- Center: dynamic label -->
            <span class="wa-label">
              <span class="text-default">💼 Complete Invoice Process</span>
              <span class="text-saving" aria-hidden="true">Saving…</span>
              <span class="text-downloading" aria-hidden="true">Downloading…</span>
              <span class="text-sending" aria-hidden="true">Sending…</span>
              <span class="text-success" aria-hidden="true">Sent!</span>
            </span>

            <!-- Right: stage icon stack -->
            <span class="stage-icon" aria-hidden="true">
              <!-- Saving -->
              <svg class="icon-save" viewBox="0 0 24 24">
                <path fill="currentColor" d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4ZM7 5h8v4H7V5Zm5 14a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z"/>
              </svg>
              <!-- Downloading -->
              <svg class="icon-download" viewBox="0 0 24 24">
                <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 0 1 1.4-1.42L11 12.6V4a1 1 0 0 1 1-1Zm-7 14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1a1 1 0 1 1 2 0v1Z"/>
              </svg>
              <!-- Sending -->
              <svg class="icon-send" viewBox="0 0 24 24">
                <path fill="currentColor" d="M2.01 3.87a1 1 0 0 1 1.2-.16l18 10a1 1 0 0 1 0 1.78l-18 10a1 1 0 0 1-1.43-1.13l2.22-7.76 8.1-2-8.1-2-2.22-7.76a1 1 0 0 1 .23-.97Z"/>
              </svg>
            </span>

            <!-- Furthest right: spinner -->
            <span class="spinner" aria-hidden="true"></span>

            <!-- Success check -->
            <span class="success-check" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="100%" height="100%">
                <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-opacity=".85" stroke-width="2"/>
                <path d="M7 12.5l3.2 3.2L17 9.8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>

          <!-- NEW: WhatsApp Invoice ONLY (ghost) -->
          <button type="button" class="btn ghost" id="waInvoiceBtn">📲 WhatsApp Invoice</button>

          <!-- Print / PDF -->
          <button type="button" class="btn ghost" id="printBtn">🖨️ Print / PDF</button>
          <button type="button" class="btn ghost" id="previewBtn">👁️ Preview</button>
          <button type="button" class="btn ghost" id="copyTextBtn">📋 Copy Summary</button>

          <!-- Optional: Manual VCF download -->

          </button>

        </div>

  <!-- Offscreen PDF render target -->
  <div id="monoRender" style="position:fixed; left:-10000px; top:0; opacity:0; pointer-events:none; visibility:visible; z-index:-1;"></div>

  <!-- Floating Add button -->
  <button type="button" class="fab" id="fabAdd">+ Add</button>
  <!-- ================================
       APPLICATION SCRIPT
       ================================ -->
  <script>
  (function(){
    /* ----------------------------- 1) THEME ----------------------------- */
    const THEME_KEY='nusrat.theme';
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); }
    function curTheme(){ return document.documentElement.getAttribute('data-theme') || 'light'; }
    function updateThemeBtn(){
      const b=document.getElementById('themeToggle'); const isDark = curTheme()==='dark';
      b.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
    }
    (function initTheme(){
      const saved = localStorage.getItem(THEME_KEY);
      applyTheme(saved || (prefersDark ? 'dark' : 'light'));
      updateThemeBtn();
    })();
    document.getElementById('themeToggle').addEventListener('click', ()=>{
      const next = curTheme()==='dark' ? 'light' : 'dark';
      applyTheme(next); localStorage.setItem(THEME_KEY, next); updateThemeBtn();
    });

    /* ----------------------------- 2) CONFIG ----------------------------- */
    const LINKS = {
      instagram: "https://www.instagram.com/nusrat_enterprises/",
      waChannel: "https://whatsapp.com/channel/0029VaTqsgN5Ui2gpzD62D06",
      googleFeedback: "https://search.google.com/local/writereview?placeid=ChIJebZSWdmnGToRWa9S2iTwlgo"
    };
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwFcSGSZjTmUtxWtyxnK1fnRWH9uNPZA7VRdd1jr1uT73h-y-eHfOgTQ11u34Ambeyo/exec';
    const AUTH_TOKEN  = '9705322252';
    const ITEM_OPTIONS=["Shirt","T-Shirt","Jean","Cargo Pant","Formal Pant","Track","Half Pant","Under Wear","Vest"];
    const NAME_MAX = 15;

    /* ----------------------------- 3) EL REFS ----------------------------- */
    const els={
      itemsList:document.getElementById('itemsList'),
      quickline:document.getElementById('quickline'),
      quicklineForm:document.getElementById('quicklineForm'),
      fabAdd:document.getElementById('fabAdd'),
      invoiceNumber:document.getElementById('invoiceNumber'),
      invoiceDate:document.getElementById('invoiceDate'),
      customerName:document.getElementById('customerName'),
      customerPhone:document.getElementById('customerPhone'),
      phoneError:document.getElementById('phoneError'),
      pickContactBtn:document.getElementById('pickContactBtn'),
      saleType:document.getElementById('saleType'),
      subtotal:document.getElementById('subtotal'),
      itemsBreakdown:document.getElementById('itemsBreakdown'),
      itemsCountQty:document.getElementById('itemsCountQty'),
      taxRate:document.getElementById('taxRate'),
      flatDiscount:document.getElementById('flatDiscount'),
      grandTotal:document.getElementById('grandTotal'),
      paymentMode:document.getElementById('paymentMode'),
      paidAmount:document.getElementById('paidAmount'),
      paidError:document.getElementById('paidError'),
      dueAmount:document.getElementById('dueAmount'),
      previewCard:document.getElementById('previewCard'),
      invoicePreview:document.getElementById('invoicePreview'),
      monoRender:document.getElementById('monoRender'),
      whatsAppBtn: document.getElementById('whatsAppBtn'),
      waInvoiceBtn: document.getElementById('waInvoiceBtn'),
      saveBtn: document.getElementById('saveToSheetBtn'),
      printBtn: document.getElementById('printBtn'),
      previewBtn: document.getElementById('previewBtn'),
      copyBtn: document.getElementById('copyTextBtn'),
      clearItemsBtn: document.getElementById('clearItemsBtn'),
      vcfBtn: document.getElementById('vcfBtn'),
    };

    /* ----------------------------- 4) SALE TYPE ----------------------------- */
    (function wireSaleTypeSegments(){
      const group = document.getElementById('saleTypeGroup');
      if (!group) return;
      const labels = Array.from(group.querySelectorAll('label.seg'));
      const radios  = Array.from(group.querySelectorAll('input[type="radio"][name="saleTypeRadio"]'));
      function setActiveByValue(val){
        labels.forEach(l => l.classList.remove('active'));
        const match = radios.find(r => r.value === val);
        if (match){
          const label = match.closest('label.seg');
          if (label) label.classList.add('active');
          const hidden = document.getElementById('saleType');
          if (hidden) hidden.value = val;
        }
      }
      radios.forEach(r => { r.checked = false; });
      els.saleType.value = '';
      labels.forEach(l => l.classList.remove('active'));
      radios.forEach(radio => {
        radio.addEventListener('change', () => {
          if (radio.checked){ setActiveByValue(radio.value); persist(); }
        });
      });
    })();

    /* ----------------------------- 5) HELPERS ----------------------------- */
    const pad2=n=>String(n).padStart(2,'0');
    function genInvoice(){ const d=new Date(); return `${pad2(d.getDate())}${pad2(d.getMonth()+1)}${d.getFullYear()}${pad2(d.getHours())}${pad2(d.getMinutes())}`; }
    function toNumber(v){ const n=parseFloat(v); return Number.isFinite(n) ? n : 0; }
    function fit(text, len){ let t=String(text||'').replace(/\s+/g,' ').trim(); return t.length>len ? t.slice(0,len-1)+'…' : t.padEnd(len,' '); }
    function p2(n, width){ return String(n.toFixed(2)).padStart(width,' '); }
    const RECEIPT_MM = 107;
    const mmToPx = mm => Math.round(mm * 96 / 25.4);
    const mmToPt = mm => (mm * 72 / 25.4);
    function setBtnLoading(btn, loading, loadingText, normalText){
      if(!btn) return;
      const textEl = btn.querySelector('.btn-text');
      const spin = btn.querySelector('.spinner');
      if(loading){
        btn.classList.add('loading'); btn.disabled = true;
        if (textEl && loadingText) textEl.textContent = loadingText;
        if (spin) spin.style.display='inline-block';
      } else {
        btn.classList.remove('loading'); btn.disabled = false;
        if (textEl && normalText) textEl.textContent = normalText;
        if (spin) spin.style.display='none';
      }
    }

    /* ----------------------------- 6) INIT HEADER ----------------------------- */
    els.invoiceNumber.value = genInvoice();
    const today = new Date();
    els.invoiceDate.value = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

    // Phone input (10 digits strict)
    els.customerPhone.addEventListener('input', (e)=>{
      e.target.value = e.target.value.replace(/\D/g,'').slice(0,10);
      validatePhone();
    });
    function validatePhone(){
      const ok = /^\d{10}$/.test(els.customerPhone.value);
      els.phoneError.style.display = ok || els.customerPhone.value.length===0 ? 'none' : 'block';
      return ok;
    }

    // Contact Picker
    els.pickContactBtn.addEventListener('click', async ()=>{
      try{
        if (!('contacts' in navigator) || !('select' in navigator.contacts)) {
          alert('Contact picking is not supported on this browser. Try Chrome on Android with HTTPS.');
          return;
        }
        const selected = await navigator.contacts.select(['name','tel'], { multiple:false });
        if (!selected || !selected.length) return;
        const c = selected[0];

        let phones = [];
        if (Array.isArray(c.tel)) phones = c.tel;
        else if (Array.isArray(c.phoneNumbers)) phones = c.phoneNumbers.map(p => p.number || p.value || p);
        else if (c.tel) phones = [c.tel];
        else if (c.phoneNumber) phones = [c.phoneNumber];

        const raw = (phones && phones[0]) ? String(phones[0]) : '';
        const digits = raw.replace(/\D/g,'');
        const last10 = digits.slice(-10);
        if (last10.length === 10) { els.customerPhone.value = last10; validatePhone(); }

        if (c.name) {
          if (Array.isArray(c.name)) els.customerName.value = c.name[0] || els.customerName.value;
          else if (typeof c.name === 'string') els.customerName.value = c.name || els.customerName.value;
        }
      }catch(err){
        console.error(err);
        alert('Contact picking was cancelled or failed.');
      }
    });

    /* ----------------------------- 7) ITEMS ----------------------------- */
    const LS='nusrat.vertical.items.v7';
    function compute(obj){ return Math.max(0, obj.qty * obj.rate); }
    function liToObj(li){
      const obj = {
        type: li.querySelector('[data-f="type"]').value || '',
        name: (li.querySelector('[data-f="name"]').value || '').trim() || (li.querySelector('[data-f="type"]').value || 'Item'),
        qty:  toNumber(li.querySelector('[data-f="qty"]').value),
        rate: toNumber(li.querySelector('[data-f="rate"]').value)
      };
      if (obj.name.length > NAME_MAX) obj.name = obj.name.slice(0, NAME_MAX);
      obj.amount = compute(obj);
      return obj;
    }
    function getItems(){ return Array.from(els.itemsList.children).map(liToObj); }
    function updateLi(li){
      const amt = liToObj(li).amount;
      li.querySelector('[data-f="amt"]').textContent = amt.toFixed(2);
    }
    function updateNameCounter(nameEl, ccEl){
      if(!nameEl) return;
      const len = nameEl.value.length;
      if (ccEl) ccEl.textContent = `${len}/${NAME_MAX}`;
      if (len === NAME_MAX){ showErrorBelow(nameEl, `Max ${NAME_MAX} characters reached.`); }
      else { hideErrorBelow(nameEl); }
    }
    function attachLi(li){
      const typeEl = li.querySelector('[data-f="type"]');
      const nameEl = li.querySelector('[data-f="name"]');
      const qtyEl  = li.querySelector('[data-f="qty"]');
      const ccEl   = li.querySelector('[data-f="cc"]');

      updateNameCounter(nameEl, ccEl);

      nameEl.addEventListener('input', () => {
        if (nameEl.value.length > NAME_MAX) nameEl.value = nameEl.value.slice(0, NAME_MAX);
        updateNameCounter(nameEl, ccEl); updateLi(li); recalc(); persist();
      });

      li.querySelector('[data-act="minus"]').addEventListener('click', ()=>{
        qtyEl.value = Math.max(1, (parseInt(qtyEl.value||'1',10)-1));
        updateLi(li); recalc(); persist();
      });
      li.querySelector('[data-act="plus"]').addEventListener('click', ()=>{
        qtyEl.value = Math.max(1, (parseInt(qtyEl.value||'1',10)+1));
        updateLi(li); recalc(); persist();
      });

      li.addEventListener('input', (e)=>{
        if (e.target === typeEl){
          if ((!nameEl.value || ITEM_OPTIONS.includes(nameEl.value)) && typeEl.value) {
            nameEl.value = typeEl.value.slice(0, NAME_MAX);
            updateNameCounter(nameEl, ccEl);
          }
        }
        updateLi(li); recalc(); persist();
      });
      li.addEventListener('change', ()=>{ updateLi(li); recalc(); persist(); });

      li.querySelector('.del').addEventListener('click', ()=>{ li.remove(); recalc(); persist(); });
    }
    function addItem(obj={type:'',name:'',qty:1,rate:''}, { atTop = true } = {}){
      const safeName = (obj.name || obj.type || '').slice(0, NAME_MAX).replace(/"/g,'&quot;');
      const li = document.createElement('li'); li.className='item';
      li.innerHTML = `
        <div class="top">
          <div class="type">
            <select data-f="type">
              <option value="" disabled ${obj.type?'':'selected'}>Select item</option>
              ${ITEM_OPTIONS.map(x=>`<option value="${x}" ${x===obj.type?'selected':''}>${x}</option>`).join('')}
            </select>
          </div>
          <div class="name name-wrap">
            <input class="name" data-f="name" placeholder="Name" maxlength="15" value="${safeName}"/>
            <div class="char-counter" data-f="cc" aria-live="polite">0/15</div>
          </div>
          <button type="button" class="btn danger del" title="Delete">✕</button>
        </div>
        <div class="bot">
          <div class="stepper">
            <button type="button" class="sbtn" data-act="minus">−</button>
            <input class="qty" data-f="qty" type="number" min="1" step="1" value="${obj.qty||1}"/>
            <button type="button" class="sbtn" data-act="plus">+</button>
          </div>
          <input class="rate" data-f="rate" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Rate" value="${obj.rate === '' ? '' : (obj.rate||0)}"/>
          <div class="amt">₹ <span data-f="amt">0.00</span></div>
        </div>
      `;
      if (atTop && els.itemsList.firstChild) els.itemsList.insertBefore(li, els.itemsList.firstChild);
      else els.itemsList.appendChild(li);
      attachLi(li); updateLi(li); recalc();
    }

    // Quickline parse & actions
    function parseQuickline(s){
      const parts = (s||'').trim().split(/\s+/);
      if(!parts.length) return null;
      let name=[], qty=1, rate='';
      for(let i=parts.length-1;i>=0;i--){
        const t=parts[i];
        if(rate==='' && /^[0-9]+(\.[0-9]+)?$/.test(t)){ rate = parseFloat(t); continue; }
        if(qty===1 && /^[0-9]+$/.test(t)){ qty = parseInt(t,10); continue; }
        name = parts.slice(0, i+1); break;
      }
      if(name.length===0) name = [parts[0]];
      const nm = name.join(' ').slice(0, NAME_MAX);
      return { name: nm, qty, rate: rate===''?'':rate };
    }
    function addFromQuickline(){
      const parsed = parseQuickline(els.quickline.value);
      if(!parsed || parsed.rate===''){ alert('Use: Item  Qty  Rate. Example: "Shirt 2 300"'); return; }
      let typeMatch = ITEM_OPTIONS.find(x => parsed.name.toLowerCase().includes(x.toLowerCase()));
      addItem({ type:typeMatch||'', name:parsed.name, qty:parsed.qty, rate:parsed.rate }, { atTop: true });
      els.quickline.value=''; persist();
    }
    els.quicklineForm.addEventListener('submit', (e) => { e.preventDefault(); addFromQuickline(); });
    els.quickline.addEventListener('keydown', (e) => {
      if ((e.key && e.key.toLowerCase() === 'enter') || e.keyCode === 13) { e.preventDefault(); addFromQuickline(); }
    });
    els.quickline.addEventListener('input', () => {
      if (/\n/.test(els.quickline.value)) { els.quickline.value = els.quickline.value.replace(/\n/g, '').trim(); }
    });
    els.fabAdd.addEventListener('click', () => addItem({}, { atTop: true }));

    // Clear items
    els.clearItemsBtn.addEventListener('click', ()=>{
      if(!confirm('Clear all items?')) return;
      els.itemsList.innerHTML = '';
      try { localStorage.removeItem(LS); } catch(_) {}
      recalc();
    });

    // Persistence
    function persist(){ try{ localStorage.setItem(LS, JSON.stringify(getItems())); }catch(_){} }
    function load(){
      const raw=localStorage.getItem(LS);
      if(!raw){ recalc(); return; }
      try{
        const arr=JSON.parse(raw);
        if(Array.isArray(arr) && arr.length){
          els.itemsList.innerHTML='';
          arr.forEach(it=> addItem({
            type: it.type||'',
            name: (it.name||'').slice(0, NAME_MAX),
            qty: it.qty||1,
            rate: (it.rate===''? '': it.rate)
          }, { atTop: false }));
        }
      }catch(e){}
      recalc();
    }

    /* ----------------------------- 8) TOTALS ----------------------------- */
    function buildItemsBreakdown(items){
      const map = new Map();
      items.forEach(it=>{
        const qty=toNumber(it.qty);
        if(!qty) return;
        const key=(it.name||it.type||'Item').toString().trim();
        map.set(key,(map.get(key)||0)+qty);
      });
      const parts=[]; for (const [name,qty] of map.entries()) parts.push(`${qty}x ${name}`);
      return parts.join(', ');
    }
    function recalc(){
      const items=getItems();
      const countQty = items.reduce((s,i)=> s + toNumber(i.qty), 0);
      const breakdown = buildItemsBreakdown(items);

      const subtotal=items.reduce((s,i)=> s + toNumber(i.amount), 0);
      const gstRate=toNumber(els.taxRate.value);
      const flat=toNumber(els.flatDiscount.value);
      const gstAmt=subtotal*(gstRate/100);
      let grand=subtotal+gstAmt-flat; if(grand<0) grand=0;

      els.subtotal.value=subtotal.toFixed(2);
      els.grandTotal.value=grand.toFixed(2);
      els.itemsBreakdown.value = breakdown;
      els.itemsCountQty.value = String(countQty);

      const paid=toNumber(els.paidAmount.value);
      let negotiated = grand - paid; if(negotiated < 0) negotiated = 0;
      els.dueAmount.value = negotiated.toFixed(2);

      validatePaid();
    }

    // Paid validation
    els.paidAmount.addEventListener('keydown', (e)=>{
      const blocked = ['e','E','+','-'];
      if (blocked.includes(e.key)) e.preventDefault();
    });
    els.paidAmount.addEventListener('input', (e)=>{
      let v = e.target.value || '';
      v = v.replace(/[^\d.]/g, '');
      const parts = v.split('.');
      if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
      if (parts.length === 2) { parts[1] = parts[1].slice(0, 2); v = parts[0] + '.' + parts[1]; }
      e.target.value = v;
      recalc(); persist();
    });
    function validatePaid(){
      const paid = toNumber(els.paidAmount.value);
      const grand = toNumber(els.grandTotal.value);
      if (els.paidAmount.value === '') { els.paidError.style.display='none'; return true; }
      if (paid > grand) { els.paidError.textContent='Paid cannot exceed Grand Total.'; els.paidError.style.display='block'; return false; }
      els.paidError.style.display='none'; return true;
    }

    ['taxRate','flatDiscount','paidAmount','paymentMode','saleType'].forEach(id=>{
      const el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('input', ()=>{ recalc(); persist(); });
      el.addEventListener('change', ()=>{ recalc(); persist(); });
    });

    // Validation helpers
    function showErrorBelow(el, msg){
      let e=el.parentElement.querySelector('.error');
      if(!e){ e=document.createElement('div'); e.className='error'; el.parentElement.appendChild(e);}
      e.textContent=msg; e.style.display='block';
    }
    function hideErrorBelow(el){
      const e=el.parentElement.querySelector('.error'); if(e) e.style.display='none';
    }
    function validateAll(forAction='general'){
      let ok=true;
      if(!els.customerName.value.trim()){ showErrorBelow(els.customerName,'Customer name is required.'); ok=false; } else hideErrorBelow(els.customerName);
      if(!/^\d{10}$/.test(els.customerPhone.value)){ els.phoneError.style.display='block'; ok=false; } else els.phoneError.style.display='none';
      if(!els.saleType.value){ showErrorBelow(els.saleType,'Select sale type.'); ok=false; } else { hideErrorBelow(els.saleType); }

      const rows = Array.from(els.itemsList.children);
      if(!rows.length){ ok=false; alert('Add at least one item.'); }
      let hasValid=false;
      rows.forEach(li=>{
        const sel = li.querySelector('[data-f="type"]');
        const qty = li.querySelector('[data-f="qty"]');
        const rate= li.querySelector('[data-f="rate"]');
        const name= li.querySelector('[data-f="name"]');
        if(!sel.value){ showErrorBelow(sel,'Select an item.'); ok=false; } else hideErrorBelow(sel);
        if(!qty.value){ showErrorBelow(qty,'Enter quantity.'); ok=false; } else hideErrorBelow(qty);
        if(rate.value===''){ showErrorBelow(rate,'Enter rate.'); ok=false; } else hideErrorBelow(rate);
        if (name.value.length > NAME_MAX){ showErrorBelow(name, `Item name cannot exceed ${NAME_MAX} characters.`); ok=false; }
        else if (name.value.length === NAME_MAX) { showErrorBelow(name, `Max ${NAME_MAX} characters reached.`); }
        else { hideErrorBelow(name); }
        if (sel.value && qty.value && rate.value!=='') hasValid=true;
      });
      if(!hasValid) ok=false;

      if(!els.paymentMode.value){ showErrorBelow(els.paymentMode,'Select payment mode.'); ok=false; } else hideErrorBelow(els.paymentMode);
      if(els.paidAmount.value===''){ showErrorBelow(els.paidAmount,'Enter paid amount (0 allowed).'); ok=false; } else hideErrorBelow(els.paidAmount);
      if(!validatePaid()) ok = false;

      if(!ok && forAction!=='general'){ alert('Please correct highlighted fields.'); }
      return ok;
    }

    /* ----------------------------- 9) PREVIEW ----------------------------- */
    function renderPreview(){
      const items=getItems();
      const rowsHtml = items.map(it=>`
        <div style="display:flex;justify-content:space-between;border-bottom:1px solid #f3f4f6;padding:6px 0">
          <div>${it.name}</div>
          <div>Qty ${it.qty} × ₹${toNumber(it.rate).toFixed(2)} = <b>₹${toNumber(it.amount).toFixed(2)}</b></div>
        </div>
      `).join('');

      const subtotal=toNumber(els.subtotal.value);
      const gstRate=toNumber(els.taxRate.value);
      const gstAmt=subtotal*(gstRate/100);
      const flat=toNumber(els.flatDiscount.value);
      const grand=toNumber(els.grandTotal.value);
      const paid=toNumber(els.paidAmount.value);
      const negotiated=toNumber(els.dueAmount.value);

      const lines=[];
      if (gstRate>0 && gstAmt > 0) lines.push(`<tr><td>GST ${gstRate}%</td><td style="text-align:right">₹${gstAmt.toFixed(2)}</td></tr>`);
      if (flat>0) lines.push(`<tr><td>Discount</td><td style="text-align:right">-₹${flat.toFixed(2)}</td></tr>`);
      lines.push(`<tr><td><b>Grand Total</b></td><td style="text-align:right"><b>₹${grand.toFixed(2)}</b></td></tr>`);
      if (els.paymentMode.value) lines.push(`<tr><td>Payment Mode</td><td style="text-align:right">${els.paymentMode.value}</td></tr>`);
      if (paid>0) lines.push(`<tr><td>Paid</td><td style="text-align:right">₹${paid.toFixed(2)}</td></tr>`);
      if (negotiated>0) lines.push(`<tr><td><b>Negotiated</b></td><td style="text-align:right"><b>₹${negotiated.toFixed(2)}</b></td></tr>`);

      els.invoicePreview.innerHTML = `
        <div class="print-header">
          <div>
            <div class="print-title">Nusrat Enterprises</div>
            <div class="print-meta">📞 7978830017, 9330066455, 9040366455</div>
            <div class="print-meta">📍Plot No. 53, Goutam Nagar, Bhubaneswar, Odisha — 751014</div>
          </div>
          <div style="text-align:right" class="print-meta">
            <div><b>Invoice #:</b> ${els.invoiceNumber.value}</div>
            <div><b>Date:</b> ${els.invoiceDate.value || ''}</div>
            <div><b>Customer:</b> ${els.customerName.value || ''}</div>
          </div>
        </div>
        ${rowsHtml}
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <table>${lines.join('')}</table>
        </div>`;
    }

    /* ----------------------------- 10) WA SUMMARY ----------------------------- */
    function summaryMonospace() {
      const items = getItems();
      const toAscii = s => String(s || '').replace(/[^\x00-\x7F]/g, '');
      const padEnd = (s, n) => (s.length > n ? s.slice(0, n) : s.padEnd(n, ' '));
      const padStart = (s, n) => (s.length > n ? s.slice(-n) : s.padStart(n, ' '));
      function fmtNoDecimal(n) {
        if (n == null || n === '') return '';
        const num = Number(n);
        if (Number.isNaN(num)) return String(n);
        const raw = Number.isInteger(num) ? String(num) : num.toFixed(2).replace(/\.?0+$/, '');
        return toAscii(raw);
      }
      function makeLine40(idx, name, qty, rate, amount) {
        const W = { idx: 2, name: 15, qty: 3, rate: 3, amt: 5 };
        const fIdx = padEnd(toAscii(idx), W.idx);
        const fName = padEnd(toAscii(name).slice(0, W.name), W.name);
        const fQty = padStart(fmtNoDecimal(qty), W.qty);
        const fRate = padStart(fmtNoDecimal(rate), W.rate);
        const fAmt = padEnd(fmtNoDecimal(amount), W.amt);
        return `${fIdx} ${fName} ${fQty}X${fRate}=${fAmt}`;
      }
      const rows = items.map((it, i) => {
        const qty = Number(it.qty) || 0;
        const rate = Number(it.rate) || 0;
        const amount = qty * rate;
        return makeLine40(i + 1, it.name, qty, rate, amount);
      });

      const subtotal = Number(els.subtotal.value || 0);
      const gstRate = Number(els.taxRate.value || 0);
      const flat = Number(els.flatDiscount.value || 0);
      const gstAmt = subtotal * (gstRate / 100);
      const grand = Number(els.grandTotal.value || 0);
      const paid = Number(els.paidAmount.value || 0);
      const due = Number(els.dueAmount.value || 0);

      const totals = [
        `Subtotal: ₹${subtotal.toFixed(2)}`,
        ...(gstRate > 0 ? [`GST ${gstRate}%: ₹${gstAmt.toFixed(2)}`] : []),
        ...(flat > 0 ? [`Discount: -₹${flat.toFixed(2)}`] : []),
        `Grand Total: ₹${grand.toFixed(2)}`,
        ...(paid > 0 ? [`Paid: ₹${paid.toFixed(2)}`] : []),
        ...(due > 0 ? [`Negotiated: ₹${due.toFixed(2)}`] : []),
      ];

      const columnHeader = "# Name            Qty  Rate Amt";
      const lines = [
        "Nusrat Enterprises",
        "Phones: 7978830017, 9330066455, 9040366455",
        "Address: Plot 53, Goutam Nagar, Bhubaneswar - 751014",
        "Trusted Since 2008",
        "",
        `Invoice: ${els.invoiceNumber.value} | Date: ${els.invoiceDate.value}`,
        `Customer: ${els.customerName.value}`,
        "",
        columnHeader,
        ...rows,
        "",
        ...totals,
        "",
        "Thank you for shopping with Nusrat Enterprises!",
        "",
        `Review: ${LINKS.googleFeedback}`,
        `WA Channel: ${LINKS.waChannel}`,
        `Instagram: ${LINKS.instagram}`
      ];
      return "```\n" + lines.join("\n") + "\n```";
    }

    /* ----------------------------- 11) PDF (monospace) ----------------------------- */
    function buildMonospaceHTML() {
      const items=getItems();
      const COLS = { idx:3, name:22, qty:3, rate:8, amt:10 };
      const lineSep = '-'.repeat(COLS.idx+1+COLS.name+1+COLS.qty+1+COLS.rate+1+COLS.amt);
      const header = [ fit('#',COLS.idx), fit('ITEM',COLS.name), fit('QTY',COLS.qty), fit('RATE',COLS.rate), fit('AMOUNT',COLS.amt) ].join(' ');
      const rows = items.map((it,i)=>{
        const idx=String(i+1).padStart(COLS.idx,' ');
        const nm =fit(it.name,COLS.name);
        const qt =String(toNumber(it.qty)).padStart(COLS.qty,' ');
        const rt =p2(toNumber(it.rate),COLS.rate);
        const am =p2(toNumber(it.amount),COLS.amt);
        return `${idx} ${nm} ${qt} ${rt} ${am}`;
      });

      const subtotal=toNumber(els.subtotal.value);
      const gstRate=toNumber(els.taxRate.value);
      const gstAmt=subtotal*(gstRate/100);
      const flat=toNumber(els.flatDiscount.value);
      const grand=toNumber(els.grandTotal.value);
      const paid=toNumber(els.paidAmount.value);
      const negotiated=toNumber(els.dueAmount.value);

      function kv(k,v){ const key=(k+':').padEnd(13,' '); const val=String(v); return key + val; }
      return `
        <div id="monoBox" style="
          width:${mmToPx(RECEIPT_MM)}px; padding:12px; border:1px solid #e5e7eb; border-radius:8px; background:#fff; color:#111827;
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono','Courier New', monospace; font-size:12px; line-height:1.4;">
          <pre style="margin:0; white-space:pre-wrap;">${
            [
              'Nusrat Enterprises',
              '📞 7978830017, 9330066455, 9040366455',
              '📍Plot No. 53, Goutam Nagar, Bhubaneswar, Odisha — 751014',
              '',
              `Invoice: ${els.invoiceNumber.value}` + (els.invoiceDate.value ? ` | Date: ${els.invoiceDate.value}` : ''),
              els.customerName.value ? `Customer: ${els.customerName.value}` : '',
              '',
              header, lineSep, ...rows, lineSep,
              kv('Subtotal', `₹${subtotal.toFixed(2)}`),
              ...(gstRate>0 && gstAmt>0 ? [kv(`GST ${gstRate}%`, `₹${gstAmt.toFixed(2)}`)] : []),
              ...(flat>0 ? [kv('Discount', `-₹${flat.toFixed(2)}`)] : []),
              kv('Grand Total', `₹${grand.toFixed(2)}`),
              ...(els.paymentMode.value ? [kv('Payment Mode', els.paymentMode.value)] : []),
              ...(paid>0 ? [kv('Paid', `₹${paid.toFixed(2)}`)] : []),
              ...(toNumber(negotiated)>0 ? [kv('Negotiated', `₹${toNumber(negotiated).toFixed(2)}`)] : []),
              '',
              'Thank you for shopping with Nusrat Enterprises!'
            ].join('\n')
          }</pre>
          <div style="height:8px"></div>
          <div style="font-size:11px;color:#374151">
            <div style="font-weight:600;margin-bottom:4px">Follow &amp; Feedback:</div>
            <div><a id="gLink" href="${LINKS.googleFeedback}" target="_blank" rel="noopener">Google Feedback: ${LINKS.googleFeedback}</a></div>
            <div><a id="igLink" href="${LINKS.instagram}" target="_blank" rel="noopener">Instagram: ${LINKS.instagram}</a></div>
            <div><a id="waLink" href="${LINKS.waChannel}" target="_blank" rel="noopener">WhatsApp Channel: ${LINKS.waChannel}</a></div>
          </div>
        </div>`;
    }

    async function generatePdf() {
      els.monoRender.innerHTML = buildMonospaceHTML();
      await new Promise(r => setTimeout(r, 120));
      const box = els.monoRender.querySelector('#monoBox');
      const ig = els.monoRender.querySelector('#igLink');
      const wa = els.monoRender.querySelector('#waLink');
      const gl = els.monoRender.querySelector('#gLink');

      const canvas = await html2canvas(box, { scale: 2, backgroundColor: '#ffffff', useCORS: true });

      const pageWpt = mmToPt(RECEIPT_MM);
      const margin = 8;
      const targetWidth = pageWpt - margin * 2;
      const ratio = canvas.height / canvas.width;
      const targetHeight = targetWidth * ratio;
      const pageHpt = targetHeight + margin * 2;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'pt', format: [pageWpt, pageHpt] });

      const x = margin, y = margin, w = targetWidth, h = targetHeight;
      const imgData = canvas.toDataURL('image/png');
      pdf.addImage(imgData, 'PNG', x, y, w, h, undefined, 'FAST');

      const scaleX = w / canvas.width;
      const scaleY = h / canvas.height;
      function addLinkHotspot(el, url) {
        if (!el) return;
        const r = el.getBoundingClientRect();
        const base = box.getBoundingClientRect();
        const dx = r.left - base.left;
        const dy = r.top  - base.top;
        const lx = x + dx * scaleX;
        const ly = y + dy * scaleY;
        const lW = r.width * scaleX;
        const lH = r.height * scaleY;
        try { pdf.link(lx, ly, lW, lH, { url }); } catch(_) {}
      }
      addLinkHotspot(ig, LINKS.instagram);
      addLinkHotspot(wa, LINKS.waChannel);
      addLinkHotspot(gl, LINKS.googleFeedback);

      const cust = (els.customerName.value || 'Customer').replace(/[^\w\s-]+/g,'').trim().replace(/\s+/g,'_');
      const filename = `Invoice_${cust}_${els.invoiceDate.value}.pdf`;
      pdf.save(filename);
    }

    /* ----------------------------- 12) VCF ----------------------------- */
    function sanitizeName(s){ return (s||'').replace(/[\n\r;:,]/g,' ').trim(); }
    function makeVCard(){
      const first = sanitizeName(els.customerName.value || '');
      const last = sanitizeName(els.saleType.value || '');
      const phone10 = (els.customerPhone.value || '').replace(/\D/g,'').slice(-10);
      const msisdn = phone10 ? `+91${phone10}` : '';
      const org = 'Nusrat Enterprises';
      const title = last || '';
      const fn = (first + (last ? (' ' + last) : '')).trim() || 'Customer';
      const lines = [
        'BEGIN:VCARD','VERSION:3.0',
        `N:${last};${first};;;`,`FN:${fn}`,
        ...(title ? [`TITLE:${title}`] : []),
        `ORG:${org}`,
        ...(msisdn ? [`TEL;TYPE=CELL,VOICE:${msisdn}`] : []),
        ...(phone10 ? [`X-WA-ID:91${phone10}`] : []),
        `NOTE:Invoice ${els.invoiceNumber.value || ''}${els.paymentMode.value ? (' | Payment ' + els.paymentMode.value) : ''}`,
        'END:VCARD'
      ];
      return lines.join('\r\n');
    }
    function downloadVcfNow(){
      const vcf = makeVCard();
      const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
      const a = document.createElement('a');
      const safeName = (els.customerName.value || 'Customer').replace(/[^\w\s-]+/g,'').trim().replace(/\s+/g,'_');
      const safeSale = (els.saleType.value || 'Sale').replace(/[^\w\s-]+/g,'').trim().replace(/\s+/g,'_');
      a.href = URL.createObjectURL(blob);
      a.download = `${safeName}_${safeSale}.vcf`;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 300);
    }

    /* ----------------------------- 13) GOOGLE SHEET ----------------------------- */
    async function collectInvoicePayload() {
      const items = getItems();
      return {
        token: AUTH_TOKEN,
        invoiceNumber: els.invoiceNumber.value || '',
        invoiceDate: els.invoiceDate.value || '',
        customerName: els.customerName.value || '',
        customerPhone: els.customerPhone.value || '',
        itemsBreakdown: els.itemsBreakdown.value || '',
        itemsCountQty: els.itemsCountQty.value || '0',
        subtotal: els.subtotal.value || '0',
        taxRate: els.taxRate.value || '0',
        flatDiscount: els.flatDiscount.value || '0',
        grandTotal: els.grandTotal.value || '0',
        paymentMode: els.paymentMode.value || '',
        paidAmount: els.paidAmount.value || '0',
        dueAmount: els.dueAmount.value || '0',
        saleType: els.saleType.value || '',
        items
      };
    }
    async function pushToGoogleSheet(opts = {}) {
      const { alertOnResult = true } = opts;
      if (!validateAll('push')) { if (alertOnResult) alert('Please correct highlighted fields.'); return false; }
      const payload = await collectInvoicePayload();
      try {
        const form = new FormData(); form.append('payload', JSON.stringify(payload));
        const res = await fetch(WEB_APP_URL, { method:'POST', body: form });
        let ok = false;
        try { const json = await res.json(); ok = !!(json && json.ok); } catch (_) { ok = res.ok; }
        if (!ok && alertOnResult) {
          const txt = await res.text().catch(()=> '');
          alert('Failed to save to Google Sheet ❌' + (txt ? '\n' + txt.slice(0,500) : ''));
        }
        return ok;
      } catch (err) {
        console.error(err);
        if (alertOnResult) alert('Network error while saving to Google Sheet.');
        return false;
      }
    }

    /* ----------------------------- 14) ACTIONS ----------------------------- */
    document.getElementById('previewBtn').addEventListener('click', ()=>{
      if (!validateAll('preview')) return;
      els.previewCard.style.display='block';
      renderPreview();
    });

    document.getElementById('printBtn').addEventListener('click', async (e)=>{
      e.preventDefault();
      if (!validateAll('print')) return;
      try { await generatePdf(); } catch (err) { console.error(err); alert('PDF generation failed. Please try again.'); }
    });

    els.saveBtn.addEventListener('click', async ()=>{
      if (!validateAll('push')) return;
      setBtnLoading(els.saveBtn, true, 'Saving…', null);
      try {
        await pushToGoogleSheet({ alertOnResult: true });
      } finally {
        setBtnLoading(els.saveBtn, false, null, 'Save to Google Sheet');
      }
    });

    els.copyBtn.addEventListener('click', ()=>{
      if (!validateAll('copy')) return;
      const items=getItems(); const lines=[];
      lines.push('Nusrat Enterprises');
      lines.push('📞 7978830017, 9330066455, 9040366455');
      lines.push('📍Plot No. 53, Goutam Nagar, Bhubaneswar, Odisha — 751014');
      lines.push('');
      lines.push(`Invoice: ${els.invoiceNumber.value}`);
      if(els.invoiceDate.value) lines.push(`Date: ${els.invoiceDate.value}`);
      if(els.customerName.value) lines.push(`Customer: ${els.customerName.value}`);
      lines.push(''); lines.push('Items:');
      items.forEach((it,i)=>lines.push(`${i+1}. ${it.name} — Qty ${it.qty} × ₹${toNumber(it.rate).toFixed(2)} = ₹${toNumber(it.amount).toFixed(2)}`));
      const subtotal=toNumber(els.subtotal.value), gstRate=toNumber(els.taxRate.value), flat=toNumber(els.flatDiscount.value), grand=toNumber(els.grandTotal.value);
      const gstAmt=subtotal*(gstRate/100); const paid=toNumber(els.paidAmount.value); const negotiated=toNumber(els.dueAmount.value);
      lines.push('');
      if(gstRate>0 && gstAmt>0) lines.push(`GST ${gstRate}%: ₹${gstAmt.toFixed(2)}`);
      if(flat>0) lines.push(`Discount: -₹${flat.toFixed(2)}`);
      lines.push(`Grand Total: ₹${grand.toFixed(2)}`);
      if(els.paymentMode.value) lines.push(`Payment Mode: ${els.paymentMode.value}`);
      if(paid>0) lines.push(`Paid: ₹${paid.toFixed(2)}`);
      if(negotiated>0) lines.push(`Negotiated: ₹${negotiated.toFixed(2)}`);
      lines.push('');
      lines.push('Thank you for shopping with Nusrat Enterprises!');
      lines.push('');
      lines.push('Follow & Feedback:');
      lines.push(`Instagram: ${LINKS.instagram}`);
      lines.push(`WhatsApp Channel: ${LINKS.waChannel}`);
      lines.push(`⭐ Write a Review: ${LINKS.googleFeedback}`);
      navigator.clipboard.writeText(lines.join('\n'))
        .catch(()=>alert('Copy failed (permission denied).'));
    });

    // Manual VCF button
    els.vcfBtn.addEventListener('click', ()=>{
      const nameOk = !!els.customerName.value.trim();
      const phoneOk = /^\d{10}$/.test(els.customerPhone.value || '');
      const saleOk = !!els.saleType.value;
      if (!nameOk || !phoneOk || !saleOk) {
        validateAll('vcf');
        alert('Please ensure Customer Name, 10-digit WhatsApp number, and Sale Type are filled.');
        return;
      }
      downloadVcfNow();
    });

    // Staged flow: Save -> VCF -> WhatsApp (Complete Invoice Process)
    function setWaState(stateClass){
      const btn = els.whatsAppBtn;
      btn.classList.remove('is-saving','is-downloading','is-sending','is-success');
      btn.removeAttribute('aria-busy');
      if(stateClass){
        btn.classList.add(stateClass);
        if(stateClass !== 'is-success'){ btn.setAttribute('aria-busy','true'); }
      }
    }
    els.whatsAppBtn.addEventListener('click', async ()=>{
      if (!validateAll('whatsapp')) return;
      try {
        setWaState('is-saving');
        const saved = await pushToGoogleSheet({ alertOnResult: false });
        if (!saved) { setWaState(''); alert('Saving to Google Sheet failed. Please try again.'); return; }
        setWaState('is-downloading');
        downloadVcfNow();
        setWaState('is-sending');
        const phone = `91${els.customerPhone.value}`;
        const msg = summaryMonospace();
        setTimeout(()=>{
          window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank','noopener,noreferrer');
          setWaState('is-success');
          setTimeout(()=> setWaState(''), 1400);
        }, 500);
      } catch (err) {
        console.error(err);
        setWaState('');
        alert('Something went wrong while processing the WhatsApp flow.');
      }
    });

    // NEW: WhatsApp Invoice ONLY (ghost button)
    if (els.waInvoiceBtn){
      els.waInvoiceBtn.addEventListener('click', ()=>{
        if (!validateAll('whatsappInvoice')) return;
        const phone = `91${els.customerPhone.value}`;
        const msg = summaryMonospace();
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank','noopener,noreferrer');
      });
    }

    // Boot
    load();
  })();
  </script>
  </body>
